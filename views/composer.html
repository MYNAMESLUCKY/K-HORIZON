<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src ##CSP_SOURCE## https: data:; script-src ##CSP_SOURCE## 'unsafe-inline' https:; style-src ##CSP_SOURCE## 'unsafe-inline' https:; font-src ##CSP_SOURCE## https:;">
  <link rel="stylesheet" href="##SHARED_CSS_URI##">
  <title>K-Horizon Composer</title>
  <style>
    body {
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
    }
    .composer-header {
      margin-bottom: 20px;
    }
    .composer-title {
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--text-main);
      letter-spacing: 2px;
      margin: 0 0 6px 0;
      text-transform: uppercase;
    }
    .composer-desc {
      font-size: 12px;
      opacity: 0.7;
    }
    .session-panel {
      margin-top: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      padding: 16px;
      display: none;
      animation: fadeIn 0.3s ease;
    }
    .session-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .change-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }
    .change-item {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--border-light);
      border-radius: 4px;
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    .change-item:hover {
      border-color: var(--border-active);
    }
    .change-info {
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }
    .change-file-name {
      font-weight: 600;
      font-size: 12px;
    }
    .change-file-path {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 2px;
    }
    .change-actions {
      display: flex;
      gap: 6px;
    }
    .badge {
      font-size: 9px;
      font-family: var(--font-mono);
      padding: 2px 4px;
      border-radius: 2px;
      font-weight: 600;
    }
    .badge.modified {
      background: transparent;
      color: var(--text-main);
      border: 1px solid var(--border-light);
    }
    .badge.new {
      background: transparent;
      color: var(--text-main);
      border: 1px dashed var(--border-light);
    }
    .btn-sm {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 2px;
      border: 1px solid var(--border-light);
      background: transparent;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-sm:hover {
      background: #ffffff;
      color: #000000;
      border-color: #ffffff;
    }
    .btn-sm.accept {
      background: #ffffff;
      border-color: #ffffff;
      color: #000000;
    }
    .btn-sm.accept:hover {
      background: transparent;
      border-color: var(--border-active);
      color: var(--text-main);
    }
    .btn-sm.reject {
      background: transparent;
      border-color: var(--border-light);
      color: var(--text-sub);
    }
    .btn-sm.reject:hover {
      background: #ffffff;
      border-color: #ffffff;
      color: #000000;
    }
    .status-text {
      font-size: 11px;
      font-family: var(--font-mono);
      color: var(--text-sub);
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="composer-header">
    <h1 class="composer-title">Workspace Composer</h1>
    <div class="composer-desc">Describe changes across your entire workspace. K-Horizon AI will create or edit multiple files and show side-by-side diff comparisons.</div>
  </div>

  <div class="panel" style="flex: none; min-height: 160px; margin-bottom: 20px;">
    <!-- Dropdown Suggestion List for @ mentions -->
    <div class="suggest-list" id="suggestList" style="bottom: auto; top: 180px;"></div>

    <div class="input-wrapper">
      <div class="tags-container" id="tagsContainer"></div>
      <textarea 
        class="chat-input" 
        id="composerInput" 
        placeholder="e.g. 'Create a logging utility in src/logger.ts and import it in index.ts to log all web requests'..."
      ></textarea>
      
      <div class="input-actions">
        <div class="status-text" id="statusIndicator" style="display:none;">
          <span class="streaming">Applying workspace instructions...</span>
        </div>
        <div style="flex:1"></div>
        <select id="modelSelector" class="model-select-dropdown" title="Select AI Model" style="max-width: 140px; margin-right: 8px;"></select>
        <button class="icon-btn" id="attachFileBtn" title="Attach Files (Open Picker)" style="padding: 4px; margin-right: 8px;">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
          </svg>
        </button>
        <button class="action-btn" id="composeBtn">
          <span>Compose Changes</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
          </svg>
        </button>
        <button class="action-btn" id="stopBtn" style="display:none; background: var(--vscode-button-secondaryBackground, #3a3d41); color: var(--vscode-button-secondaryForeground, #ffffff); border: 1px solid var(--vscode-button-border, transparent); margin-left: 8px;">
          <span>Stop</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 4px;">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          </svg>
        </button>
      </div>
    </div>
    <!-- Live streaming console drawer -->
    <div id="composerConsole" style="display:none; margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.5); border: 1px solid var(--border-light); font-family: var(--font-mono); font-size: 11px; max-height: 150px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; border-radius: 4px;"></div>
  </div>

  <!-- Proposed Changes List Panel -->
  <div class="session-panel" id="sessionPanel">
    <div class="session-title">
      <span>Proposed Changes</span>
      <div style="display:flex; gap:8px;">
        <button class="btn-sm accept" id="acceptAllBtn">Accept All</button>
        <button class="btn-sm reject" id="rejectAllBtn">Discard All</button>
      </div>
    </div>
    
    <div class="change-list" id="changeList"></div>
  </div>

  <script src="##COMPOSER_JS_URI##"></script>
</body>
</html>
